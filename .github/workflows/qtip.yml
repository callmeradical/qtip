name: qtip Evaluation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build qtip
        run: npm run build

      - name: Run qtip Evaluation
        run: |
          node dist/cli.js manifest.json --scenarios scenarios
